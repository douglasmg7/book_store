{% extends 'book_outlet/base.html' %}

{% block title %}
    All Books
{% endblock %}

{% block content %}
    <h3>Books</h3>
    <ul>
        {% for book in all_books %}
        <li><a href='{{ book.get_absolute_url }}'>{{ book.title }}</a></li>
        {% endfor %}
    </ul>
    <hr>
    <p>Total number of books: {{ total_number_of_books }}</p>
    <p>Average rating: {{ average_rating.rating__avg }}</p>
{% endblock %}
